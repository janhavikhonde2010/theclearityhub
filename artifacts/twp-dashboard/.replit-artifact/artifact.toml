kind = "web"
previewPath = "/"
title = "TWP Analytics Dashboard"
version = "1.0.0"
id = "artifacts/twp-dashboard"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "PORT=8080 BASE_PATH=/ pnpm --filter @workspace/twp-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/twp-dashboard", "run", "build" ]
publicDir = "artifacts/twp-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8080"
BASE_PATH = "/"
