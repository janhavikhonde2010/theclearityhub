kind = "web"
previewPath = "/"
title = "TWP Analytics Dashboard"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "web"
paths = ["/"]

[services.development]
run = "PORT=8080 BASE_PATH=/ pnpm --filter @workspace/twp-dashboard run dev"

[services.env]
PORT = "8080"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/twp-dashboard", "run", "build"]
publicDir = "artifacts/twp-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
